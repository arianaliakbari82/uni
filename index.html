<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>آرشیو جزوات دندانپزشکی</title>

<style>
:root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --text:#222;
    --accent:#2563eb;
}

@media (prefers-color-scheme: dark){
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
}
}

body{
    margin:0;
    padding:40px;
    background:var(--bg);
    color:var(--text);
    font-family:Tahoma,sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.search{
    width:100%;
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:12px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border-radius:16px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    transition:.25s;
}

.card:hover{
    transform:translateY(-5px);
}

.card a{
    text-decoration:none;
    color:var(--accent);
    font-size:18px;
    font-weight:bold;
}

.card p{
    margin-top:10px;
    opacity:.8;
}
</style>

</head>
<body>

<div class="container">

<h1>📚 آرشیو جزوات دندانپزشکی</h1>

<input
type="text"
id="search"
class="search"
placeholder="جستجو بین جزوات..."
>

<div class="grid" id="notes">

<!-- جزوات -->

<div class="card">
<a href="perio.html">periodontics</a>
<p>پریو 3</p>
</div>

<div class="card">
<a href="pedatric.html">pedatric</a>
<p>اطفال</p>
</div>

<div class="card">
<a href="radio.html">radio</a>
<p>رادیو بخش</p>
</div>

<div class="card">
<a href="protez.html">prostodontics</a>
<p>پروتز پیشرفته</p>
</div>

<div class="card">
<a href="troma.html">tromatology</a>
<p>تروما</p>
</div>

<div class="card">
<a href="tashkhis.html">oral medicine</a>
<p>تشخیص 5</p>
</div>


</div>

</div>

<script>

const search=document.getElementById("search");

search.addEventListener("keyup",()=>{

const value=search.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

const text=card.innerText.toLowerCase();

card.style.display=
text.includes(value)
? "block"
: "none";

});

});

</script>

</body>
</html>
